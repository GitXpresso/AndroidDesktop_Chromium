name: Chromium Snapshot Fetcher

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  fetch-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Latest Revision
        id: get_rev
        run: |
          REV=$(curl -s "https://www.googleapis.com/download/storage/v1/b/chromium-browser-snapshots/o/AndroidDesktop_arm64%2FLAST_CHANGE?alt=media")
          echo "revision=$REV" >> $GITHUB_ENV

      - name: Check for Existing Release
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ env.revision }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_ENV
          else
            echo "exists=false" >> $GITHUB_ENV
          fi

      - name: Process Chromium Artifacts
        if: env.exists == 'false'
        run: |
          # The %2F is the URL encoded slash for the API path
          DOWNLOAD_URL="https://www.googleapis.com/download/storage/v1/b/chromium-browser-snapshots/o/AndroidDesktop_arm64%2F${{ env.revision }}%2Fchrome-android-desktop.zip?alt=media"
          
          echo "Attempting to download from: $DOWNLOAD_URL"
          
          # Retry up to 3 times with a 30s delay in case the file isn't ready yet
          for i in {1..3}; do
            wget -q "$DOWNLOAD_URL" -O chromium.zip && break || sleep 30
          done

          if [ ! -f chromium.zip ]; then
            echo "Error: Download failed after retries. The revision might not be ready on Google servers yet."
            exit 1
          fi

          unzip -o chromium.zip
          mkdir -p final_apks
          
          # Gather all 4 APKs from the extracted zip
          find . -name "*.apk" -exec cp {} ./final_apks/ \;
          
          cd final_apks
          for f in *.apk; do
            mv "$f" "${{ env.revision }}-$f"
          done

      - name: Create GitHub Release
        if: env.exists == 'false' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ env.revision }}" \
            --title "Chromium Snapshot ${{ env.revision }}" \
            --notes "Automated 5-minute sync. Includes all 4 extracted APKs for revision ${{ env.revision }}." \
            ./final_apks/*.apk
