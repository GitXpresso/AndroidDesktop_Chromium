name: Chromium Snapshot Fetcher (High Frequency)

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  fetch-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Latest Revision
        id: get_rev
        run: |
          REV=$(curl -s "https://www.googleapis.com/download/storage/v1/b/chromium-browser-snapshots/o/AndroidDesktop_arm64%2FLAST_CHANGE?alt=media")
          echo "revision=$REV" >> $GITHUB_ENV

      - name: Check for Existing Release
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ env.revision }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_ENV
          else
            echo "exists=false" >> $GITHUB_ENV
          fi

      - name: Process Chromium Artifacts
        if: env.exists == 'false'
        run: |
          # Download the full desktop zip
          wget -q "https://www.googleapis.com/download/storage/v1/b/chromium-browser-snapshots/o/AndroidDesktop_arm64%2F${{ env.revision }}%2Fchrome-android-desktop.zip?alt=media" -O chromium.zip
          
          # Extract all files
          unzip -q chromium.zip
          
          # Create a staging directory for clean naming
          mkdir -p release_artifacts
          
          # Locate and rename all 4 APKs to include the revision number
          find . -name "*.apk" -exec cp {} release_artifacts/ \;
          
          cd release_artifacts
          for f in *.apk; do
            mv "$f" "${{ env.revision }}-$f"
          done

      - name: Create GitHub Release
        if: env.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ env.revision }}" \
            --title "Chromium Snapshot ${{ env.revision }}" \
            --notes "Automated 5-minute sync. Includes all 4 extracted APKs." \
            ./release_artifacts/*.apk
