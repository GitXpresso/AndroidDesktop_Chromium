name: Chromium Snapshot Fetcher

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  fetch-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Latest Revision
        id: get_rev
        run: |
          REV=$(curl -s "https://www.googleapis.com/download/storage/v1/b/chromium-browser-snapshots/o/AndroidDesktop_arm64%2FLAST_CHANGE?alt=media")
          echo "revision=$REV" >> $GITHUB_ENV

      - name: Check for Existing Release
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ env.revision }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_ENV
          else
            echo "exists=false" >> $GITHUB_ENV
          fi

      - name: Process Chromium Artifacts
        if: env.exists == 'false'
        run: |
          wget -q "https://www.googleapis.com/download/storage/v1/b/chromium-browser-snapshots/o/AndroidDesktop_arm64/${{ env.revision }}/chrome-android-desktop.zip?alt=media" -O chromium.zip
          unzip -o chromium.zip
          
          mkdir -p final_apks
          # Find all APKs and move them to a flat folder with the revision prefix
          find . -name "*.apk" -exec cp {} ./final_apks/ \;
          
          cd final_apks
          for f in *.apk; do
            mv "$f" "${{ env.revision }}-$f"
          done
          ls -R # This will show in logs if the files actually exist

      - name: Create GitHub Release
        if: env.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ env.revision }}" \
            --title "Chromium Snapshot ${{ env.revision }}" \
            --notes "Automated 5-minute sync for revision ${{ env.revision }}." \
            ./final_apks/*.apk
