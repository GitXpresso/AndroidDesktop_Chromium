name: Chromium Snapshot Fetcher (Dual Arch)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  fetch-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Latest Revision
        id: get_rev
        run: |
          # Fetching revision from arm64; snapshots are usually synced across archs
          REV=$(curl -s "https://www.googleapis.com/download/storage/v1/b/chromium-browser-snapshots/o/AndroidDesktop_arm64%2FLAST_CHANGE?alt=media")
          echo "revision=$REV" >> $GITHUB_ENV

      - name: Check for Existing Release
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ env.revision }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_ENV
          else
            echo "exists=false" >> $GITHUB_ENV
          fi

      - name: Process Chromium Artifacts
        if: env.exists == 'false'
        run: |
          mkdir -p final_apks
          
          # List of architectures to fetch
          ARCHS=("AndroidDesktop_arm64" "AndroidDesktop_x64")
          
          for ARCH in "${ARCHS[@]}"; do
            echo "Processing $ARCH..."
            DOWNLOAD_URL="https://www.googleapis.com/download/storage/v1/b/chromium-browser-snapshots/o/${ARCH}%2F${{ env.revision }}%2Fchrome-android-desktop.zip?alt=media"
            
            # Retry loop for reliability
            for i in {1..3}; do
              wget -q "$DOWNLOAD_URL" -O "${ARCH}.zip" && break || sleep 30
            done

            if [ -f "${ARCH}.zip" ]; then
              # Extract to a temp folder named after the arch to avoid collisions
              unzip -o "${ARCH}.zip" -d "$ARCH"
              
              # Find APKs and move them with arch and revision in the name
              # e.g., 1627712-arm64-ChromePublic.apk
              find "./$ARCH" -name "*.apk" -exec bash -c '
                ARCH_LABEL=$(echo "'$ARCH'" | cut -d"_" -f2)
                cp "$1" "./final_apks/${{ env.revision }}-${ARCH_LABEL}-$(basename "$1")"
              ' _ {} \;
            else
              echo "Warning: Could not download $ARCH. Skipping."
            fi
          done

      - name: Create GitHub Release
        if: env.exists == 'false' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if we actually have files to upload
          if [ "$(ls -A ./final_apks/)" ]; then
            gh release create "v${{ env.revision }}" \
              --title "Chromium Snapshot ${{ env.revision }}" \
              --notes "Automated sync for revision ${{ env.revision }}. Includes arm64 and x64 builds." \
              ./final_apks/*.apk
          else
            echo "No APKs found to release."
            exit 1
          fi
