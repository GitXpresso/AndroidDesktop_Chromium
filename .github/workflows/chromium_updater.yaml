name: Chromium Snapshot Fetcher

on:
  schedule:
    - cron: '0 */6 * * *' # Checks for updates every 6 hours
  workflow_dispatch: # Allows manual triggering from the Actions tab

permissions:
  contents: write # Required for the bot to create a release

jobs:
  fetch-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Latest Revision Number
        id: get_rev
        run: |
          # Fetch LAST_CHANGE without the generation parameter to always get the latest
          REV=$(curl -s "https://www.googleapis.com/download/storage/v1/b/chromium-browser-snapshots/o/AndroidDesktop_arm64%2FLAST_CHANGE?alt=media")
          echo "revision=$REV" >> $GITHUB_ENV
          echo "Fetched upstream revision: $REV"

      - name: Check if Release Already Exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use GitHub CLI to check if we already released this version
          if gh release view "v${{ env.revision }}" > /dev/null 2>&1; then
            echo "Release v${{ env.revision }} already exists. Stopping."
            echo "exists=true" >> $GITHUB_ENV
          else
            echo "New revision found. Proceeding with download."
            echo "exists=false" >> $GITHUB_ENV
          fi

      - name: Download and Extract APK
        if: env.exists == 'false'
        run: |
          echo "Downloading chrome-android-desktop.zip..."
          wget -q "https://www.googleapis.com/download/storage/v1/b/chromium-browser-snapshots/o/AndroidDesktop_arm64%2F${{ env.revision }}%2Fchrome-android-desktop.zip?alt=media" -O chrome-android-desktop.zip

          echo "Unzipping archive..."
          unzip -q chrome-android-desktop.zip

          echo "Locating APK..."
          # Find the APK file extracted from the zip
          APK_PATH=$(find . -type f -name "*.apk" | head -n 1)

          if [ -z "$APK_PATH" ]; then
            echo "Error: No APK found in the downloaded zip."
            exit 1
          fi

          # Rename the APK cleanly for the GitHub release
          APK_NAME="ChromiumSnapshot-arm64-${{ env.revision }}.apk"
          mv "$APK_PATH" "./$APK_NAME"
          echo "apk_file=$APK_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        if: env.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ env.revision }}" \
            --title "Chromium Snapshot ${{ env.revision }}" \
            --notes "Automated fetch and extraction for AndroidDesktop_arm64 revision ${{ env.revision }}." \
            "./${{ env.apk_file }}"
